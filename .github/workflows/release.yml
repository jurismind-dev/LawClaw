name: Release

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "自动递增版本号类型"
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      tag:
        description: "可选：指定发布标签（例如 v1.0.0），留空则自动递增"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  OSS_BUCKET: lawclaw
  OSS_ENDPOINT: oss-cn-shanghai.aliyuncs.com
  OSS_PUBLIC_BASE_URL: https://lawclaw.oss-cn-shanghai.aliyuncs.com

jobs:
  prepare:
    name: Prepare Release Tag
    if: ${{ github.event_name != 'push' || github.ref_type != 'tag' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
      build_ref: ${{ steps.meta.outputs.build_ref }}
      target_commitish: ${{ steps.meta.outputs.target_commitish }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Resolve and create release tag
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
          INPUT_BUMP: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          set -euo pipefail

          tag_regex='^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'
          tag=""
          build_ref=""
          target_commitish="${GITHUB_SHA}"

          if [[ "${EVENT_NAME}" == "push" && "${REF_TYPE}" == "tag" ]]; then
            tag="${REF_NAME}"
            if [[ ! "${tag}" =~ ${tag_regex} ]]; then
              echo "Invalid pushed tag: ${tag}"
              exit 1
            fi
            build_ref="${GITHUB_REF}"
          else
            bump_type="${INPUT_BUMP}"
            if [[ "${EVENT_NAME}" == "push" && "${REF_TYPE}" == "branch" ]]; then
              bump_type="patch"
            fi

            if [[ -n "${INPUT_TAG}" ]]; then
              tag="${INPUT_TAG}"
            else
              latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)"
              if [[ -z "${latest_tag}" ]]; then
                latest_version="0.0.0"
              else
                latest_version="${latest_tag#v}"
              fi

              next_version="$(node -e '
                const [current, bump] = process.argv.slice(1);
                const parts = current.split(".").map((x) => Number.parseInt(x, 10));
                if (parts.length !== 3 || parts.some(Number.isNaN)) {
                  throw new Error(`Invalid base version: ${current}`);
                }
                if (bump === "major") {
                  parts[0] += 1; parts[1] = 0; parts[2] = 0;
                } else if (bump === "minor") {
                  parts[1] += 1; parts[2] = 0;
                } else {
                  parts[2] += 1;
                }
                process.stdout.write(parts.join("."));
              ' "${latest_version}" "${bump_type}")"

              tag="v${next_version}"
            fi

            if [[ ! "${tag}" =~ ${tag_regex} ]]; then
              echo "Invalid release tag: ${tag}"
              echo "Expected format like v1.0.0 or v1.0.0-beta.1"
              exit 1
            fi

            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists on origin; reusing it."
              build_ref="refs/tags/${tag}"
              target_commitish="$(git rev-list -n 1 "${build_ref}" 2>/dev/null || true)"
              if [[ -z "${target_commitish}" ]]; then
                target_commitish="${GITHUB_SHA}"
              fi
            else
              echo "Tag ${tag} does not exist yet; it will be created during release publish."
              build_ref="${GITHUB_SHA}"
            fi
          fi

          echo "release_tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "release_version=${tag#v}" >> "${GITHUB_OUTPUT}"
          echo "build_ref=${build_ref}" >> "${GITHUB_OUTPUT}"
          echo "target_commitish=${target_commitish}" >> "${GITHUB_OUTPUT}"

  build:
    needs: prepare
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Intel + Apple Silicon)
            os: macos-latest
            platform: mac
          - name: Windows
            os: windows-latest
            platform: win

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.build_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Cache Electron binaries (macOS)
        if: matrix.platform == 'mac'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Cache Electron binaries (Windows)
        if: matrix.platform == 'win'
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Verify Jurismind connector runtime files
        run: node scripts/check-connector-runtime.mjs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Align app version with release tag
        shell: bash
        run: |
          node -e '
            const fs = require("node:fs");
            const path = "package.json";
            const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
            pkg.version = process.env.RELEASE_VERSION;
            fs.writeFileSync(path, `${JSON.stringify(pkg, null, 4)}\n`);
            console.log(`package.json version set to ${pkg.version}`);
          '
          node -p "require('./package.json').version"

      - name: Ensure bundled uv for macOS
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if pnpm run uv:ensure:mac; then
              exit 0
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "uv:ensure:mac failed after ${attempt} attempts"
              exit 1
            fi
            delay=$((attempt * 5))
            echo "uv:ensure:mac failed (attempt ${attempt}), retry in ${delay}s..."
            sleep "${delay}"
          done

      - name: Ensure bundled uv for Windows
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            pnpm run uv:ensure:win
            if ($LASTEXITCODE -eq 0) { exit 0 }
            if ($attempt -eq 3) {
              throw "uv:ensure:win failed after $attempt attempts"
            }
            $delay = 5 * $attempt
            Write-Host "uv:ensure:win failed (attempt $attempt), retry in ${delay}s..."
            Start-Sleep -Seconds $delay
          }

      - name: Build macOS packages (x64 + arm64)
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAC_CERTS: ${{ secrets.MAC_CERTS }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          MAC_APPLE_ID: ${{ secrets.APPLE_ID }}
          MAC_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MAC_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          retry_cmd() {
            local max_attempts="$1"
            shift
            local attempt=1
            until "$@"; do
              if [[ "${attempt}" -ge "${max_attempts}" ]]; then
                echo "Command failed after ${attempt} attempts: $*"
                return 1
              fi
              local delay=$((attempt * 10))
              echo "Command failed (attempt ${attempt}/${max_attempts}), retry in ${delay}s: $*"
              sleep "${delay}"
              attempt=$((attempt + 1))
            done
          }

          pnpm run build:vite
          pnpm exec zx scripts/bundle-openclaw.mjs
          pnpm exec zx scripts/bundle-qq-plugin.mjs

          if [[ -n "${MAC_CERTS:-}" && -n "${MAC_CERTS_PASSWORD:-}" && -n "${MAC_APPLE_ID:-}" && -n "${MAC_APPLE_APP_SPECIFIC_PASSWORD:-}" && -n "${MAC_APPLE_TEAM_ID:-}" ]]; then
            echo "Mac signing secrets are set. Building signed and notarized artifacts."
            export CSC_LINK="${MAC_CERTS}"
            export CSC_KEY_PASSWORD="${MAC_CERTS_PASSWORD}"
            export APPLE_ID="${MAC_APPLE_ID}"
            export APPLE_APP_SPECIFIC_PASSWORD="${MAC_APPLE_APP_SPECIFIC_PASSWORD}"
            export APPLE_TEAM_ID="${MAC_APPLE_TEAM_ID}"
            retry_cmd 3 pnpm exec electron-builder --mac --x64 --publish never
            retry_cmd 3 pnpm exec electron-builder --mac --arm64 --publish never
          else
            echo "Mac signing secrets are missing. Building unsigned artifacts."
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID CSC_NAME
            retry_cmd 3 pnpm exec electron-builder --config electron-builder.nosign.yml --mac --x64 --publish never
            retry_cmd 3 pnpm exec electron-builder --config electron-builder.nosign.yml --mac --arm64 --publish never
          fi

      - name: Build Windows packages (x64 + arm64)
        if: matrix.platform == 'win'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          function Invoke-WithRetry {
            param(
              [scriptblock]$Action,
              [int]$MaxAttempts = 3,
              [int]$BaseDelaySeconds = 10
            )
            for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
              & $Action
              if ($LASTEXITCODE -eq 0) { return }
              if ($attempt -eq $MaxAttempts) {
                throw "Command failed after $attempt attempts"
              }
              $delay = $BaseDelaySeconds * $attempt
              Write-Host "Command failed (attempt $attempt/$MaxAttempts), retry in ${delay}s..."
              Start-Sleep -Seconds $delay
            }
          }

          pnpm run build:vite
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          pnpm exec zx scripts/bundle-openclaw.mjs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          pnpm exec zx scripts/bundle-qq-plugin.mjs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Invoke-WithRetry { pnpm exec electron-builder --win --x64 --publish never }
          Invoke-WithRetry { pnpm exec electron-builder --win --arm64 --publish never }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 7
          path: |
            release/*.dmg
            release/*.exe
            !release/builder-debug.yml
            !release/builder-effective-config.yaml

  publish:
    needs:
      - prepare
      - build
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}

    steps:
      - name: Validate release tag format
        shell: bash
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.].+)?$ ]]; then
            echo "Invalid release tag: ${RELEASE_TAG}"
            echo "Expected format like v1.2.3 or v1.2.3-beta.1"
            exit 1
          fi

      - name: Checkout code for release notes
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.target_commitish }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show release files
        shell: bash
        run: |
          echo "Release tag: ${RELEASE_TAG}"
          find release-artifacts -type f -print | sort

      - name: Resolve update channel
        id: channel
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          channel="$(echo "${version}" | sed -nE 's/.*-([A-Za-z]+).*/\1/p')"
          if [[ -z "${channel}" ]]; then
            channel="latest"
          fi

          # Keep stable aliases on latest feed.
          if [[ "${channel}" == "stable" ]]; then
            channel="latest"
          fi

          echo "Resolved release channel: ${channel}"
          echo "release_channel=${channel}" >> "${GITHUB_OUTPUT}"

      - name: Validate release payload
        shell: bash
        run: |
          set -euo pipefail

          require_pattern() {
            local pattern="$1"
            local label="$2"
            local count
            count="$(find release-artifacts -type f -name "${pattern}" | wc -l | tr -d ' ')"
            if [[ "${count}" -eq 0 ]]; then
              echo "Missing required ${label} files (${pattern}) in release-artifacts/"
              exit 1
            fi
          }

          require_pattern "*-mac-arm64.dmg" "macOS Apple Silicon installer"
          require_pattern "*-mac-x64.dmg" "macOS Intel installer"
          require_pattern "*-win-arm64.exe" "Windows ARM64 installer"
          require_pattern "*-win-x64.exe" "Windows x64 installer"

      - name: Upload release artifacts to OSS
        shell: bash
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_SECURITY_TOKEN: ${{ secrets.OSS_SECURITY_TOKEN }}
          RELEASE_CHANNEL: ${{ steps.channel.outputs.release_channel }}
        run: |
          set -euo pipefail

          if [[ -z "${OSS_ACCESS_KEY_ID:-}" || -z "${OSS_ACCESS_KEY_SECRET:-}" ]]; then
            echo "Missing OSS credentials. Please configure OSS_ACCESS_KEY_ID and OSS_ACCESS_KEY_SECRET."
            exit 1
          fi

          python3 -m pip install --disable-pip-version-check --quiet oss2

          python3 - <<'PY'
          import hashlib
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          import oss2

          root = Path("release-artifacts")
          files = sorted([p for p in root.rglob("*") if p.is_file()])
          if not files:
            raise SystemExit("No files found in release-artifacts/")

          bucket_name = os.environ["OSS_BUCKET"]
          endpoint = os.environ["OSS_ENDPOINT"]
          release_tag = os.environ["RELEASE_TAG"]
          release_version = release_tag[1:] if release_tag.startswith("v") else release_tag
          release_channel = os.environ["RELEASE_CHANNEL"]
          access_key_id = os.environ["OSS_ACCESS_KEY_ID"]
          access_key_secret = os.environ["OSS_ACCESS_KEY_SECRET"]
          security_token = os.environ.get("OSS_SECURITY_TOKEN") or None
          release_date_iso = datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")

          if security_token:
            auth = oss2.StsAuth(access_key_id, access_key_secret, security_token)
          else:
            auth = oss2.Auth(access_key_id, access_key_secret)

          bucket = oss2.Bucket(auth, f"https://{endpoint}", bucket_name)

          def sha256(path: Path) -> str:
            digest = hashlib.sha256()
            with path.open("rb") as handle:
              for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                digest.update(chunk)
            return digest.hexdigest()

          dedup: dict[str, tuple[Path, str]] = {}
          for artifact in files:
            name = artifact.name
            file_hash = sha256(artifact)
            existing = dedup.get(name)
            if existing:
              if existing[1] != file_hash:
                raise SystemExit(
                  f"Conflicting artifact name detected: {name} appears multiple times with different content."
                )
              continue
            dedup[name] = (artifact, file_hash)

          no_cache_headers = {"Cache-Control": "no-cache, no-store, must-revalidate"}

          def latest_alias(name: str) -> str | None:
            if name.endswith("-mac-arm64.dmg"):
              return "LawClaw-mac-arm64.dmg"
            if name.endswith("-mac-x64.dmg"):
              return "LawClaw-mac-x64.dmg"
            if name.endswith("-win-arm64.exe"):
              return "LawClaw-win-arm64.exe"
            if name.endswith("-win-x64.exe"):
              return "LawClaw-win-x64.exe"
            return None

          alias_sources: dict[str, Path] = {}
          for name in sorted(dedup):
            artifact, _ = dedup[name]
            alias_name = latest_alias(name)
            if alias_name:
              alias_sources[alias_name] = artifact

          required_aliases = [
            "LawClaw-mac-arm64.dmg",
            "LawClaw-mac-x64.dmg",
            "LawClaw-win-arm64.exe",
            "LawClaw-win-x64.exe",
          ]
          missing_aliases = [name for name in required_aliases if name not in alias_sources]
          if missing_aliases:
            raise SystemExit(
              "Missing required latest artifacts after mapping: " + ", ".join(missing_aliases)
            )

          # Keep OSS channel directory clean: only latest build artifacts remain.
          channel_prefix = f"{release_channel}/"
          stale_keys = [obj.key for obj in oss2.ObjectIterator(bucket, prefix=channel_prefix)]
          for key in stale_keys:
            bucket.delete_object(key)
            print(f"Deleted stale object oss://{bucket_name}/{key}")

          # Remove legacy release history directory in OSS.
          legacy_prefix = "releases/"
          legacy_keys = [obj.key for obj in oss2.ObjectIterator(bucket, prefix=legacy_prefix)]
          for key in legacy_keys:
            bucket.delete_object(key)
            print(f"Deleted legacy object oss://{bucket_name}/{key}")

          for alias_name in required_aliases:
            artifact = alias_sources[alias_name]
            alias_headers = {
              **no_cache_headers,
              "x-oss-meta-version": release_version,
              "x-oss-meta-release-tag": release_tag,
              "x-oss-meta-release-date": release_date_iso,
            }
            alias_key = f"{release_channel}/{alias_name}"
            alias_result = bucket.put_object_from_file(alias_key, str(artifact), headers=alias_headers)
            if alias_result.status not in (200, 201):
              raise SystemExit(
                f"Upload failed for oss://{bucket_name}/{alias_key}, status={alias_result.status}"
              )
            print(f"Uploaded latest artifact {artifact} -> oss://{bucket_name}/{alias_key}")
          PY

      - name: Generate release body from commits and merges
        id: release_body
        shell: bash
        env:
          TARGET_COMMITISH: ${{ needs.prepare.outputs.target_commitish }}
          RELEASE_CHANNEL: ${{ steps.channel.outputs.release_channel }}
        run: |
          set -euo pipefail

          previous_tag="$(
            git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname \
              | grep -Fxv "${RELEASE_TAG}" \
              | head -n 1 || true
          )"

          range="${TARGET_COMMITISH}"
          compare_url="https://github.com/${GITHUB_REPOSITORY}/commit/${TARGET_COMMITISH}"
          if [[ -n "${previous_tag}" ]]; then
            range="${previous_tag}..${TARGET_COMMITISH}"
            compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${TARGET_COMMITISH}"
          fi

          direct_commits="$(git log "${range}" --no-merges --pretty=format:'- %s (%h)' -n 20 || true)"

          body_file="${RUNNER_TEMP}/release-body.md"

          {
            echo "## 发布概览"
            echo
            echo "- 版本：\`${RELEASE_TAG}\`"
            if [[ -n "${previous_tag}" ]]; then
              echo "- 变更范围：\`${previous_tag}..${RELEASE_TAG}\`"
            else
              echo "- 变更范围：首次发布"
            fi
            echo "- 对比链接：${compare_url}"
            echo
            echo "## 发布说明"
            if [[ -n "${direct_commits}" ]]; then
              echo "${direct_commits}"
            else
              echo "- 无普通提交记录"
            fi
            echo
            echo "## 安装包下载"
            echo
            echo "请按系统与芯片架构选择安装包："
            echo
            echo "### macOS"
            echo "- Apple Silicon (M1/M2/M3/M4): \`LawClaw-*-mac-arm64.dmg\`"
            echo "- Intel (x64): \`LawClaw-*-mac-x64.dmg\`"
            echo
            echo "### Windows"
            echo "- 安装包 (x64): \`LawClaw-*-win-x64.exe\`"
            echo "- 安装包 (ARM64): \`LawClaw-*-win-arm64.exe\`"
            echo
            echo "## 安装提示"
            echo
            echo "- macOS（未签名版本）可能出现“已损坏，无法打开。你应该将它移到废纸篓”或“无法验证开发者”提示，请按以下步骤操作："
            echo "  1. 将 \`LawClaw.app\` 从 DMG 拖入“应用程序”目录。"
            echo "  2. 完成复制后，先退出（Eject）磁盘映像，再从“应用程序”中启动。"
            echo "  3. 首次启动时按住 \`Control\` 键点击应用，选择“打开”，并在弹窗中确认。"
            echo "  4. 如仍被系统拦截，在终端执行：\`xattr -dr com.apple.quarantine /Applications/LawClaw.app\`，然后重新打开应用。"
            echo "- Windows 若触发 SmartScreen，请点击“更多信息”后选择“仍要运行”继续安装。"
            echo
            echo "---"
            echo
            echo "如遇问题，请在 GitHub Issues 反馈："
            echo "https://github.com/${GITHUB_REPOSITORY}/issues"
            echo
          } > "${body_file}"

          echo "body_path=${body_file}" >> "${GITHUB_OUTPUT}"

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ needs.prepare.outputs.target_commitish }}
          name: LawClaw ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          make_latest: ${{ contains(env.RELEASE_TAG, '-') && 'false' || 'true' }}
          generate_release_notes: true
          body_path: ${{ steps.release_body.outputs.body_path }}
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
